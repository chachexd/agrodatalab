{% extends "base.html" %}
{% block title %}Iniciar sesión — AgroDataLab{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h3 mb-3">Iniciar sesión</h1>
        <form method="post">{% csrf_token %}
            {% for campo in form %}
            <div class="mb-3">
                <label class="form-label">{{ campo.label }}</label>
                {{ campo }}
                {% if campo.errors %}<div class="text-danger small">{{ campo.errors|striptags }}</div>{% endif %}
            </div>
            {% endfor %}
            <button class="btn btn-success">Entrar</button>
            <a class="btn btn-link" href="{% url 'registro' %}">Crear cuenta</a>
        </form>
    </div>
</div>
{% endblock %}
