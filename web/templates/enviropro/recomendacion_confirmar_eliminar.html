{% extends "base.html" %}
{% block title %}Eliminar recomendación{% endblock %}
{% block contenido %}
<h1 class="h3 mb-3">¿Eliminar la recomendación «{{ rec.titulo }}»?</h1>
<p>Esta acción no se puede deshacer.</p>
<form method="post">{% csrf_token %}
    <button class="btn btn-danger">Sí, eliminar</button>
    <a class="btn btn-secondary" href="{% url 'recomendacion_detalle' rec.pk %}">Cancelar</a>
</form>
{% endblock %}
