# Configuración de despliegue para Render (https://render.com).
services:
  - type: web
    name: agrodatalab-enviropro
    env: python
    region: frankfurt
    rootDir: web
    buildCommand: "pip install -r ../requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn agrodatalab.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
